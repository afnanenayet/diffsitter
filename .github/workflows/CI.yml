name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # Lint: formatting + clippy (run once, not per-target)
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # --------------------------------------------------------------------------
  # Build + test matrix across platforms
  # --------------------------------------------------------------------------
  build:
    name: Test ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: i686-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - if: matrix.job.os == 'ubuntu-latest'
        name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.job.target }}
      - if: matrix.job.os != 'ubuntu-latest'
        name: Install native Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.job.target }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - if: matrix.job.target == 'x86_64-unknown-linux-gnu'
        name: Doc tests
        run: cargo test --doc --features better-build-info,static-grammar-libs,dynamic-grammar-libs
      - name: Tests
        run: cargo nextest run --locked --target ${{ matrix.job.target }} --features better-build-info,static-grammar-libs,dynamic-grammar-libs --profile ci
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: '**/target/nextest/ci/junit.xml'
          check_name: Tests (${{ matrix.job.target }})

  # --------------------------------------------------------------------------
  # MCP server: compile check + tests (feature-gated, only needs one platform)
  # --------------------------------------------------------------------------
  mcp-server:
    name: MCP server
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mcp
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Build MCP server binary
        run: cargo build --features mcp-server --bin tree-sitter-mcp
      - name: MCP server tests
        run: cargo nextest run --locked --features mcp-server,static-grammar-libs --profile ci -E 'binary(~mcp_server_test)'
