name: post-deploy script

on:
  release:
    types:
      - published

jobs:
  post-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> "$GITHUB_ENV"

      - name: Test env
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          echo "$RELEASE_VERSION"
      - name: Abort if main branch
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          if [[ "$RELEASE_VERSION" == "main" ]]; then
            exit 1
          fi
      - name: Abort if nightly
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          if [[ "$RELEASE_VERSION" == "nightly" ]]; then
            exit 1
          fi

      - name: Trigger homebrew
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          BREW_TOKEN: ${{ secrets.DIFFSITTER_BREW_PACKAGE_DEPLOYMENT }}
        run: |
          curl -X POST https://api.github.com/repos/afnanenayet/homebrew-tap/dispatches \
          -H 'Accept: application/vnd.github.v3+json' \
          -u "$BREW_TOKEN" \
          --data '{ "event_type": "update-diffsitter", "client_payload": { "version": "'"$RELEASE_VERSION"'" } }'
